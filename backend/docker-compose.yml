version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: under_armour_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:${APP_KEY:-}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-under_armour}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - db
    networks:
      - under_armour_network

  db:
    image: mysql:8.0
    container_name: under_armour_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-under_armour}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - under_armour_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: under_armour_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-root}
      PMA_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - under_armour_network

volumes:
  dbdata:
    driver: local

networks:
  under_armour_network:
    driver: bridge
