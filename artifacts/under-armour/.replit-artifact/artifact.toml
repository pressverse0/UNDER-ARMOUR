kind = "web"
previewPath = "/"
title = "Under Armour"
version = "1.0.0"
id = "artifacts/under-armour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19131

[services.development]
run = "pnpm --filter @workspace/under-armour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/under-armour", "run", "build" ]
publicDir = "artifacts/under-armour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19131"
BASE_PATH = "/"
